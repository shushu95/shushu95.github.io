<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>色彩捕捉 - 挑战你的反应力</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        .game-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
        }

        /* 顶部信息栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .score-box, .time-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .score-label, .time-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 28px;
            font-weight: 800;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }

        .time-value {
            font-size: 24px;
            font-weight: 700;
            color: #f87171;
        }

        /* 目标颜色提示 */
        .target-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .target-text {
            font-size: 16px;
            color: #cbd5e1;
            margin-bottom: 12px;
        }

        .target-color {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(255,255,255,0.3), inset 0 0 20px rgba(0,0,0,0.2);
            border: 4px solid rgba(255,255,255,0.5);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 游戏网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .cell {
            aspect-ratio: 1;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .cell::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
            border-radius: 16px;
        }

        .cell:active {
            transform: scale(0.92);
        }

        .cell.wrong {
            animation: shake 0.5s;
            filter: brightness(0.5);
        }

        .cell.correct {
            animation: pop 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); filter: brightness(1.3); }
            100% { transform: scale(1); }
        }

        /* 连击提示 */
        .combo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            color: #fbbf24;
            text-shadow: 0 0 30px rgba(251,191,36,0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 100;
        }

        .combo.show {
            animation: comboAnim 0.8s forwards;
        }

        @keyframes comboAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
        }

        /* 开始/结束界面 */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-content {
            text-align: center;
            padding: 40px;
            max-width: 360px;
        }

        .game-title {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-subtitle {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(239, 68, 68, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .final-score {
            font-size: 72px;
            font-weight: 900;
            color: #fbbf24;
            margin: 20px 0;
            text-shadow: 0 0 40px rgba(251,191,36,0.5);
        }

        .rank-text {
            font-size: 18px;
            color: #cbd5e1;
            margin-bottom: 30px;
        }

        .rules {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.8;
        }

        .rules strong {
            color: #fbbf24;
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #fbbf24, #ef4444);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        /* 粒子效果 */
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            animation: particleFly 0.8s forwards;
        }

        @keyframes particleFly {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0) translate(var(--tx), var(--ty)); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 连击提示 -->
        <div class="combo" id="combo"></div>

        <!-- 游戏界面 -->
        <div id="gameUI" style="display:none;">
            <div class="header">
                <div class="score-box">
                    <div class="score-label">得分</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="time-box">
                    <div class="time-label">时间</div>
                    <div class="time-value" id="time">30</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>

            <div class="target-section">
                <div class="target-text">找到这个颜色 👇</div>
                <div class="target-color" id="targetColor"></div>
            </div>

            <div class="grid" id="grid"></div>
        </div>

        <!-- 开始界面 -->
        <div class="overlay" id="startScreen">
            <div class="overlay-content">
                <div class="game-title">色彩捕捉</div>
                <div class="game-subtitle">考验你的眼力与反应速度</div>
                <div class="rules">
                    <strong>🎮 游戏规则：</strong><br>
                    • 点击与上方目标颜色相同的方块<br>
                    • 正确 +10 分，连续正确有连击加成<br>
                    • 点错会扣除时间<br>
                    • 限时 30 秒，挑战最高分！
                </div>
                <button class="btn" onclick="startGame()">开始挑战</button>
            </div>
        </div>

        <!-- 结束界面 -->
        <div class="overlay hidden" id="endScreen">
            <div class="overlay-content">
                <div class="game-title">游戏结束</div>
                <div class="final-score" id="finalScore">0</div>
                <div class="rank-text" id="rankText">还不错！</div>
                <button class="btn" onclick="startGame()">再玩一次</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const COLORS = [
            { name: '红色', hex: '#ef4444', bg: 'linear-gradient(135deg, #ef4444, #dc2626)' },
            { name: '橙色', hex: '#f97316', bg: 'linear-gradient(135deg, #f97316, #ea580c)' },
            { name: '黄色', hex: '#eab308', bg: 'linear-gradient(135deg, #eab308, #ca8a04)' },
            { name: '绿色', hex: '#22c55e', bg: 'linear-gradient(135deg, #22c55e, #16a34a)' },
            { name: '青色', hex: '#06b6d4', bg: 'linear-gradient(135deg, #06b6d4, #0891b2)' },
            { name: '蓝色', hex: '#3b82f6', bg: 'linear-gradient(135deg, #3b82f6, #2563eb)' },
            { name: '紫色', hex: '#a855f7', bg: 'linear-gradient(135deg, #a855f7, #9333ea)' },
            { name: '粉色', hex: '#ec4899', bg: 'linear-gradient(135deg, #ec4899, #db2777)' }
        ];

        let score = 0;
        let timeLeft = 30;
        let combo = 0;
        let maxCombo = 0;
        let timer = null;
        let gameActive = false;
        let currentTarget = null;

        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const gridEl = document.getElementById('grid');
        const targetColorEl = document.getElementById('targetColor');
        const startScreen = document.getElementById('startScreen');
        const endScreen = document.getElementById('endScreen');
        const gameUI = document.getElementById('gameUI');
        const progressEl = document.getElementById('progress');
        const comboEl = document.getElementById('combo');

        function startGame() {
            score = 0;
            timeLeft = 30;
            combo = 0;
            maxCombo = 0;
            gameActive = true;

            scoreEl.textContent = '0';
            timeEl.textContent = '30';
            progressEl.style.width = '100%';

            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            gameUI.style.display = 'block';

            generateGrid();

            timer = setInterval(() => {
                timeLeft -= 0.1;
                timeEl.textContent = Math.ceil(timeLeft);
                progressEl.style.width = (timeLeft / 30 * 100) + '%';

                if (timeLeft <= 5) {
                    timeEl.style.color = '#ef4444';
                    progressEl.style.background = '#ef4444';
                } else {
                    timeEl.style.color = '#f87171';
                    progressEl.style.background = 'linear-gradient(90deg, #fbbf24, #ef4444)';
                }

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 100);
        }

        function generateGrid() {
            gridEl.innerHTML = '';

            // 随机选择目标颜色
            currentTarget = COLORS[Math.floor(Math.random() * COLORS.length)];
            targetColorEl.style.background = currentTarget.bg;

            // 生成9个格子
            const cells = [];

            // 确保至少有一个正确答案
            cells.push(currentTarget);

            // 填充其他颜色（可以重复）
            for (let i = 1; i < 9; i++) {
                let color;
                if (Math.random() > 0.3) {
                    // 70%概率放入干扰色
                    do {
                        color = COLORS[Math.floor(Math.random() * COLORS.length)];
                    } while (color.hex === currentTarget.hex);
                } else {
                    // 30%概率放入正确答案（增加难度和机会）
                    color = currentTarget;
                }
                cells.push(color);
            }

            // 打乱顺序
            cells.sort(() => Math.random() - 0.5);

            // 创建格子
            cells.forEach((color, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.background = color.bg;
                cell.dataset.color = color.hex;
                cell.addEventListener('click', () => handleClick(cell, color));
                gridEl.appendChild(cell);
            });
        }

        function handleClick(cell, color) {
            if (!gameActive) return;

            if (color.hex === currentTarget.hex) {
                // 正确
                combo++;
                if (combo > maxCombo) maxCombo = combo;

                const bonus = Math.min(combo - 1, 5); // 最高5分连击加成
                const points = 10 + bonus * 5;
                score += points;

                scoreEl.textContent = score;
                cell.classList.add('correct');

                // 显示连击
                if (combo >= 2) {
                    showCombo(combo);
                }

                // 粒子效果
                createParticles(cell);

                // 奖励时间
                timeLeft = Math.min(timeLeft + 1, 30);

                setTimeout(() => {
                    generateGrid();
                }, 200);
            } else {
                // 错误
                combo = 0;
                cell.classList.add('wrong');
                timeLeft = Math.max(timeLeft - 2, 0);
                timeEl.style.color = '#ef4444';
                setTimeout(() => {
                    timeEl.style.color = '#f87171';
                }, 300);
            }
        }

        function showCombo(count) {
            comboEl.textContent = count + ' 连击!';
            comboEl.classList.remove('show');
            void comboEl.offsetWidth; // 触发重排
            comboEl.classList.add('show');
        }

        function createParticles(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 10 + 5;
                const angle = (Math.PI * 2 * i) / 8;
                const distance = Math.random() * 80 + 40;

                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    background: ${currentTarget.hex};
                    left: ${centerX}px;
                    top: ${centerY}px;
                    --tx: ${Math.cos(angle) * distance}px;
                    --ty: ${Math.sin(angle) * distance}px;
                `;

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }
        }

        function endGame() {
            gameActive = false;
            clearInterval(timer);

            const finalScore = document.getElementById('finalScore');
            const rankText = document.getElementById('rankText');

            finalScore.textContent = score;

            // 评级
            let rank = '';
            if (score >= 300) rank = '🏆 色彩大师！无人能敌！';
            else if (score >= 200) rank = '⭐ 反应神速！高手中的高手！';
            else if (score >= 100) rank = '👍 很不错的成绩！';
            else if (score >= 50) rank = '💪 继续加油，潜力无限！';
            else rank = '🌱 新手起步，多多练习！';

            rankText.innerHTML = rank + '<br><small style="color:#64748b">最高连击: ' + maxCombo + '</small>';

            gameUI.style.display = 'none';
            endScreen.classList.remove('hidden');
        }

        // 防止页面滚动（移动端）
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
